name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Show files
        run: ls -la

      - name: Grant permission
        run: chmod +x gradlew || true

      - name: Generate wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "No gradlew found, installing gradle..."
            sudo apt-get update
            sudo apt-get install -y gradle
            gradle wrapper
          fi

      - name: Check Gradle
        run: ./gradlew tasks

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
