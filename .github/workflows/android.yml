name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Check files
        run: ls -la

      - name: Grant permission
        run: chmod +x gradlew

      - name: Test Gradle
        run: ./gradlew tasks

      - name: Build APK
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/*.apk"
